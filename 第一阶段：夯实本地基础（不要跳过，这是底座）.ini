step 1：夯实本地基础（不要跳过，这是底座）
在企业里，CI/CD 的每一个步骤本质上都是在 Linux 环境下运行的脚本。
掌握 Docker（核心中的核心）：
在 Mac 上安装 Docker Desktop。
任务：写一个简单的 Web 应用（Node.js 或 Python），编写 Dockerfile。
目标：确保你的代码能跑在容器里，而不是“只在我的 Mac 上能跑”。

step 2: 掌握 Git 工作流
学习 Git Flow 或 GitHub Flow（理解主分支、开发分支、PR/Merge Request 的概念）。
目标：理解为什么代码合并到 main 分支时才触发自动部署。

step 3: 配置 GitHub Actions（流水线）
搭建好了最完美的舞台，现在我们需要写剧本（Workflow）。

第二阶段：GitHub Actions 这种“云原生”工具（零成本开始）
GitHub Actions 是目前中小企业甚至大型企业（GitHub Enterprise）的首选，且有免费额度。
编写 YAML 脚本：
在 GitHub 新建仓库，创建 .github/workflows/main.yml。
任务：
CI 部分：代码推送后，自动运行单元测试（Unit Test）和代码规范检查（Linting）。
构建部分：自动将代码打包成 Docker 镜像。
理解 Secret 管理：
学习如何在 GitHub Settings 里配置 Secrets。
目标：绝对不要把密码或 API Key 写在代码里。
