name: Node.js CI & Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
    # 第 1 步：拉取代码
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 第 2 步：外部啥也不用装，直接呼叫 Docker 干活！
    # 因为所有的环境配置、依赖安装，都已经封装在你的 Dockerfile 里面了！
    - name: 🐳 Build Docker Image
      run: docker build -t my-node-app:${{ github.sha }} .
