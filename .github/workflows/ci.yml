name: Node.js CI & Docker Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  enterprise-ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 1. 代码拉取
      uses: actions/checkout@v4

    - name: ⚙️ 2. 准备 Node 测试环境
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 3. 安装依赖
      run: npm install

    - name: 🔍 4. 运行代码规范检查 (Linting)
      run: npm run lint
      
    - name: 🧪 5. 运行核心单元测试 (Unit Tests)
      run: npm run test

    - name: 🔐 6. 演示安全密钥读取 (Secrets injection)
      # ⚠️ 注意这里：GitHub 会自动帮我们做“打码”处理
      run: |
        echo "正在使用数据库密码连接: ${{ secrets.MY_SUPER_SECRET }}"
        echo "只要配置了 Secret，哪怕不小心被打印，日志里也会变成 ***"

    - name: 🔑 7. 登录到 Docker Hub 云端车库
      # 安全登录，防止密码泄露
      run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: 🚀 8. 构建并推送镜像 (Push)
      # ⚠️ 注意：推向云端的镜像标签，必须带有你的用户名做前缀！
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/my-node-app:latest
